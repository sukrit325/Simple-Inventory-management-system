<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Dashboard-Management System </title>
    <link rel="stylesheet" href="login.css"/>
</head>
<body class="dashboard-page">
        <header>
            <h1>Dashboard-Management</h1>
            <div>
                <span>Welcome, <strong id="dashboard-username"></strong></span>
                <button type="button" class="btn-secondary" onclick="logout()">Logout</button>
            </div>
        </header>
        <main>
            <section class="toolbar">
                <button type="button" class="btn-primary" onclick="openModal()">+ Add Items</button>
                <input type="text" placeholder="Search..." id = "search" onkeyup="searchItem()"/>
            </section>
            <section class="table-card">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Quantity</th>
                            <th>Price</th>
                            <th>Created at</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-rows">
                    </tbody>
                </table>
            </section>
        </main>
        <div id="itemModal" class="modal">
            <div class="login-page">
                <span class="close" onclick="closeModal()">&times;</span>
                <h2 id="modal-title">Add New Item</h2>
                <form id="productForm">
                    <input type="hidden" id="item-id">

                    <div class="input-group">
                        <label>Product Name:</label>
                        <input type="text" id="item-name" required/>
                    </div>
                    <div class="input-group">
                        <label>Description:</label>
                        <input type="text" id="item-desc"/>
                    </div>
                    <div class="input-group">
                        <label>Quantity:</label>
                        <input type="number" id="item-qty" required/>
                    </div>
                    <div class="input-group">
                        <label>Price:</label>
                        <input type="number" id="item-price" required/>
                    </div>
                    <button type="submit" class="btn-primary">Save Item</button>
                </form>
            </div>
        </div>
        <script src="Login.js"></script>
    </body>
</html>
